<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentLog PRO — System Maintenance</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(-45deg, #1a2a6c, #b21f1f, #fdbb2d);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.12);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.25);
            border-radius: 24px;
            padding: 50px 30px;
            max-width: 480px;
            width: 100%;
            text-align: center;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            color: #ffffff;
        }

        /* Container framework simplified for a natural image layout */
        .logo-container {
            position: relative;
            margin: 0 auto 25px auto;
            display: inline-block;
        }

        .pulse-ring {
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 24px;
            background: rgba(255, 255, 255, 0.12);
            animation: pulse 2.5s infinite;
            z-index: 1;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(1.15); opacity: 0; }
        }

        /* FIXED: Removed fixed box constraints, borders, and clipping */
        .app-logo {
            display: block;
            max-width: 140px; /* Controls the size of the logo safely */
            height: auto;
            border-radius: 18px; /* Soft corner edge for the image asset */
            position: relative;
            z-index: 2;
        }

        h1 {
            font-size: 32px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 12px;
            background: linear-gradient(120deg, #ffffff, #e0e0e0);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-badge {
            display: inline-block;
            background: rgba(255, 255, 255, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.3);
            padding: 6px 14px;
            border-radius: 50px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 20px;
        }

        p {
            font-size: 16px;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.85);
            margin-bottom: 30px;
        }

        .wa-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 16px 32px;
            background: #25D366;
            color: #ffffff;
            text-decoration: none;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            box-shadow: 0 4px 15px rgba(37, 211, 102, 0.3);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        .wa-btn:hover {
            background: #20ba59;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(37, 211, 102, 0.4);
        }

        .wa-btn:active {
            transform: translateY(1px);
        }

        .footer-note {
            margin-top: 25px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.5);
            letter-spacing: 0.5px;
        }
    </style>
</head>
<body>

    <div class="glass-card">
        <div class="logo-container">
            <div class="pulse-ring"></div>
            <img src="logo.jpg" alt="RentLog PRO Logo" class="app-logo">
        </div>
        
        <div class="status-badge">Scheduled Maintenance</div>
        <h1>System Optimization</h1>
        
        <p>We are currently performing a scheduled upgrade to enhance your RentLog PRO dashboard and accounting speed. Your ledger data remains completely safe, and full access will be restored shortly.</p>
        
        <a href="https://api.whatsapp.com/send?phone=91XXXXXXXXXX&text=Hello!%20I%20need%20urgent%20assistance%20with%20RentLog%20PRO" class="wa-btn" target="_blank">
            Connect with Support 💬
        </a>

        <div class="footer-note">RentLog PRO Ecosystem</div>
    </div>

</body>
</html>
