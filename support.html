<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Support - RentLog PRO</title>
    <style>
        :root { --primary: #2196F3; --dark: #1E1E24; --light: #F4F6F9; --text: #333; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        body { color: var(--text); background: var(--light); line-height: 1.6; }
        nav { background: white; padding: 15px 10%; display: flex; justify-content: space-between; align-items: center; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        nav .logo { font-weight: 800; font-size: 22px; color: var(--primary); text-decoration: none; }
        nav a { text-decoration: none; color: #555; margin-left: 20px; font-weight: 500; }
        nav a:hover { color: var(--primary); }
        .container { max-width: 700px; margin: 40px auto; padding: 0 20px; }
        section { background: white; padding: 35px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        h2 { border-bottom: 2px solid var(--light); padding-bottom: 10px; margin-bottom: 20px; color: var(--dark); }
        .quick-contact-channels { display: flex; gap: 15px; margin-bottom: 35px; }
        .btn { display: inline-block; padding: 12px 25px; font-weight: bold; border-radius: 25px; text-decoration: none; text-align: center; color: white; }
        .btn-wa { background: #25D366; }
        .btn-email { background: #E14B42; }
        form { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        .form-group { display: flex; flex-direction: column; gap: 5px; }
        input, textarea { padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        textarea { height: 120px; resize: vertical; }
        form button { background: var(--primary); color: white; border: none; padding: 12px; font-weight: bold; border-radius: 4px; cursor: pointer; font-size: 16px; }
        form button:hover { background: #1976D2; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">RentLog PRO</a>
        <div>
            <a href="index.html">Home</a>
            <a href="download.html">Download</a>
            <a href="manual.html">User Manual</a>
        </div>
    </nav>
    <div class="container">
        <section>
            <h2>Contact Developer & Support</h2>
            <p style="margin-bottom: 20px;">Have questions or encounter issues inside the app? Connect with us instantly:</p>
            
            <div class="quick-contact-channels">
                <a href="https://wa.me/919892758104?text=Hi,%20I'm%20using%20the%20RentLog%20App%20and%20need%20some%20help." target="_blank" class="btn btn-wa">Chat on WhatsApp</a>
                <a href="mailto:rentlogpro@gmail.com?subject=RentLog%20App%20Query" class="btn btn-email">Send Direct Email</a>
            </div>

            <h3 style="margin-top: 30px; color: var(--dark);">Submit a Support Ticket</h3>
            <form action="https://formspree.io/f/xeedjyll" method="POST">
                <div class="form-group">
                    <label>Your Name</label>
                    <input type="text" name="name" placeholder="John Doe" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" placeholder="+91 XXXXX XXXXX">
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="_replyto" placeholder="john@example.com" required>
                </div>
                <div class="form-group">
                    <label>Query / Issue Detail</label>
                    <textarea name="message" placeholder="Describe your request in detail..." required></textarea>
                </div>
                <button type="submit">Submit Request</button>
            </form>
        </section>
    </div>
</body>
</html>
