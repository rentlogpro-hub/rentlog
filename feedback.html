<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RentLog PRO — User Feedback Portal</title>
    <meta name="description" content="Submit your user feedback, feature requests, or bug reports to help shape the future updates of RentLog PRO.">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a; 
            color: #f8fafc;
            line-height: 1.7;
            padding: 60px 20px;
        }

        .wrapper {
            max-width: 600px;
            margin: 0 auto;
        }

        .header {
            margin-bottom: 35px;
            text-align: center;
        }

        .blog-logo {
            display: block;
            max-width: 90px;
            height: auto;
            border-radius: 50%; /* Rounded circle matching your official logo frame */
            margin: 0 auto 20px auto;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .header p {
            color: #94a3b8;
            font-size: 15px;
        }

        .feedback-card {
            background: rgba(30, 41, 59, 0.7);
            border: 1px solid #334155;
            border-radius: 14px;
            padding: 30px;
            backdrop-filter: blur(8px);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 2px;
            color: #cbd5e1;
        }

        .form-group .input-sublabel {
            display: block;
            font-size: 11px;
            color: #64748b;
            font-weight: normal;
            margin-bottom: 8px;
        }

        .form-group input, 
        .form-group select, 
        .form-group textarea {
            width: 100%;
            padding: 12px 14px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 8px;
            color: #f8fafc;
            font-size: 14px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .form-group input:focus, 
        .form-group select:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #38bdf8;
            box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.15);
        }

        /* Style fix for standard HTML select dropdown arrow in dark mode */
        select {
            appearance: none;
            background-image: url("data:image/svg+xml;charset=UTF-8,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2394a3b8' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3e%3cpolyline points='6 9 12 15 18 9'%3e%3c/polyline%3e%3c/svg%3e");
            background-repeat: no-repeat;
            background-position: right 14px center;
            background-size: 16px;
            padding-right: 40px !important;
        }

        .submit-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #2196F3;
            color: white;
            font-weight: 700;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.2s, transform 0.1s;
        }

        .submit-btn:hover {
            background: #1976D2;
        }

        .submit-btn:active {
            transform: scale(0.98);
        }

        .back-btn {
            display: block;
            text-align: center;
            margin-top: 30px;
            color: #94a3b8;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .back-btn:hover {
            color: #38bdf8;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header">
            <img src="logo.jpg" alt="RentLog PRO Logo" class="blog-logo">
            <h1>RentLog PRO — Feedback Portal</h1>
            <p>Help us optimize your administrative property workflow. Drop your thoughts below.</p>
        </div>

        <div class="feedback-card">
            <!-- ⚠️ REPLACE "YOUR_FORMSPREE_ID" WITH YOUR ACTUAL ID AFTER STEP 2 -->
            <form action="https://formspree.io/f/mvzyqpwl" method="POST">
                
                <div class="form-group">
                    <label for="name">Your Name / Title</label>
                    <span class="input-sublabel">Optional</span>
                    <input type="text" id="name" name="name" placeholder="e.g., Landlord / Housing Manager">
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <span class="input-sublabel">Required only if you'd like us to reply back to you</span>
                    <input type="email" id="email" name="_replyto" placeholder="name@example.com">
                </div>

                <div class="form-group">
                    <label for="category">Feedback Category</label>
                    <span class="input-sublabel">Required</span>
                    <select id="category" name="category" required>
                        <option value="" disabled selected>Select an option</option>
                        <option value="Feature Request">💡 Feature Request</option>
                        <option value="Bug Report">🐛 Bug Report / Technical Issue</option>
                        <option value="General Feedback">💬 General Feedback</option>
                        <option value="Other">❓ Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Your Message</label>
                    <span class="input-sublabel">Required</span>
                    <textarea id="message" name="message" rows="5" placeholder="Tell us about your experience or describe the feature/bug..." required></textarea>
                </div>

                <!-- Email Subject Line Configuration for Formspree Dashboard -->
                <input type="hidden" name="_subject" value="New RentLog PRO Feedback Submission!">
                
                <button type="submit" class="submit-btn">Submit Secure Feedback</button>
            </form>
        </div>

        <a href="index.html" class="back-btn">← Return to Home Screen</a>
    </div>

</body>
</html>
